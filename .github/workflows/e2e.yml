name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Run E2E tests with Firebase emulators
        run: |
          firebase emulators:exec \
            --project demo-musterclub \
            --only auth,firestore \
            "npx playwright test"
        env:
          # Use demo- project so no real Firebase credentials are needed
          NEXT_PUBLIC_FIREBASE_API_KEY: demo-api-key
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: demo-musterclub.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: demo-musterclub
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: demo-musterclub.appspot.com
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "000000000000"
          NEXT_PUBLIC_FIREBASE_APP_ID: 1:000000000000:web:demo000000000000
          NEXT_PUBLIC_USE_EMULATORS: "true"

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
